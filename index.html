<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <div class="login-left">
            <div class="login-header">
                <h1>Welcome to qxner website</h1>
                <p>Please login to use the platform</p>
            </div>
            <form class="login-form">
                <div class="login-form-content">
                    <div class="form-item">
                        <label for="email">Enter Email</label>
                        <input type="text" id="email">
                    </div>
                    <div class="form-item">
                        <label for="password">Enter Password</label>
                        <input type="password" id="password">
                    </div>
                    <div class="form-item">
                        <div class="checkbox">
                            <input type="checkbox" id="rememberMeCheckbox">
                            <label for="rememberMeCheckbox" id="checkboxLabel">Remember me</label>
                        </div>
                    </div>
                    <button type="submit">Sign In</button>
                </div>
                <div class="login-form-footer">
                    <a href="#">
                        <img width="30" 
                        src="https://www.google.com/url?sa=i&url=https%3A%2F%2Fcommons.wikimedia.org%2Fwiki%2FFile%3AFacebook_f_logo_%25282019%2529.svg&psig=AOvVaw2esK2JZOjBNobCs19WrxAj&ust=1672174045924000&source=images&cd=vfe&ved=0CBAQjRxqFwoTCMjkrduTmPwCFQAAAAAdAAAAABAE" 
                        alt=""> Facebook Login
                    </a>
                    <a href="#">
                        <img src="https://www.google.com/url?sa=i&url=https%3A%2F%2Fcommons.wikimedia.org%2Fwiki%2FFile%3AGoogle_%2522G%2522_Logo.svg&psig=AOvVaw2hSL9Ekz2de95bDlgLE_vT&ust=1672174348884000&source=images&cd=vfe&ved=0CBAQjRxqFwoTCOiV7OuUmPwCFQAAAAAdAAAAABAQ" 
                        width="30" alt=""> Google Login
                    </a>
                </div>
            </form>
        </div>
        <div class="login-right"></div>
    </div>
</body>
</html>
